{{ define "main" }}
  <div role="main" class="container">
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">

        <div class="tw-flex tw-items-start tw-gap-8 tw-my-10">
          <img src="/images/profile.png" alt="Hayate Tanaka"
               class="tw-w-[140px] tw-h-[140px] tw-object-cover tw-rounded-full tw-shrink-0 tw-shadow-md">
          <div>
            <h2 class="tw-mt-0">田中 颯 <small>Hayate TANAKA</small></h2>
            <p>棘皮動物ウニ綱の分類学を研究しています。太平洋西岸域を対象にフィールドワークや博物館調査を行い、ウニ類の多様性の解明に取り組んでいます。</p>
            <div class="tw-flex tw-flex-wrap tw-gap-2 tw-mt-4">
              <a href="/page/about/"
                 class="tw-inline-block tw-px-5 tw-py-2 tw-rounded-lg tw-bg-slate-700 !tw-text-white tw-text-base tw-font-medium tw-no-underline hover:tw-bg-slate-800 tw-transition-colors tw-duration-150">About</a>
              <a href="/page/outputs/"
                 class="tw-inline-block tw-px-5 tw-py-2 tw-rounded-lg tw-border tw-border-slate-400 !tw-text-slate-700 tw-text-base tw-font-medium tw-no-underline hover:tw-bg-slate-100 tw-transition-colors tw-duration-150">CV</a>
              <a href="https://x.com/HTanattyo" target="_blank" rel="noopener"
                 class="tw-inline-block tw-px-5 tw-py-2 tw-rounded-lg tw-border tw-border-slate-400 !tw-text-slate-700 tw-text-base tw-font-medium tw-no-underline hover:tw-bg-slate-100 tw-transition-colors tw-duration-150">X</a>
              <a href="https://github.com/hayate-tanaka" target="_blank" rel="noopener"
                 class="tw-inline-block tw-px-5 tw-py-2 tw-rounded-lg tw-border tw-border-slate-400 !tw-text-slate-700 tw-text-base tw-font-medium tw-no-underline hover:tw-bg-slate-100 tw-transition-colors tw-duration-150">GitHub</a>
              <a href="https://www.linkedin.com/in/tanaka-hayate" target="_blank" rel="noopener"
                 class="tw-inline-block tw-px-5 tw-py-2 tw-rounded-lg tw-border tw-border-slate-400 !tw-text-slate-700 tw-text-base tw-font-medium tw-no-underline hover:tw-bg-slate-100 tw-transition-colors tw-duration-150">LinkedIn</a>
            </div>
          </div>
        </div>

        <hr>

        {{ with .Content }}
          <div>{{ . }}</div>
        {{ end }}

      </div>
    </div>
  </div>
{{ end }}
